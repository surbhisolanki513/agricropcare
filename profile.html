<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #004d43;
            --accent: #c68a12;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #334155;
        }

        .profile-container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        /* Header */
        .profile-header {
            background: var(--primary);
            color: white;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .avatar-upload {
            position: relative;
        }

        .avatar-upload img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            object-fit: cover;
            background: white;
        }

        .upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--accent);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid white;
            font-size: 12px;
        }

        /* Body */
        .profile-body {
            padding: 30px 40px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            margin: 25px 0 20px 0;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 77, 67, 0.1);
        }

        .form-group input[readonly] {
            background: #f8fafc;
            color: #64748b;
            cursor: not-allowed;
        }

        /* Buttons */
        .footer-actions {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-save {
            background: var(--primary);
            color: white;
        }

        .btn-save:hover {
            background: #003630;
            transform: translateY(-2px);
        }

        .btn-edit {
            background: var(--accent);
            color: white;
        }

        .success-msg {
            display: none;
            color: #16a34a;
            font-weight: 700;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="profile-container">
        <!-- Header Section -->
        <div class="profile-header">
            <div class="avatar-upload">
                <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile">
                <label for="img-input" class="upload-btn"><i class="fa-solid fa-camera"></i></label>
                <input type="file" id="img-input" style="display:none" accept="image/*" onchange="previewImage(event)">
            </div>
            <div>
                <h1 id="display-name" style="margin:0; font-size: 26px;">Yogesh Bhatti</h1>
                <p id="display-role" style="margin:5px 0; opacity: 0.9; font-weight: 500;">Warehouse Service Provider
                    (WSP)</p>
            </div>
        </div>

        <!-- Form Section -->
        <div class="profile-body">

            <div class="section-title"><i class="fa-solid fa-circle-user"></i> Personal Details</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="user-name" value="Yogesh Bhatti">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="user-email" value="yogesh.bhatti@agricrop.com">
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" id="user-phone" value="+91 99133 05200">
                </div>
                <div class="form-group">
                    <label>User Role</label>
                    <input type="text" id="user-role" value="Warehouse Service Provider (WSP)">
                </div>
            </div>

            <div class="section-title"><i class="fa-solid fa-building-shield"></i> Company & License Info</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Firm Name</label>
                    <input type="text" id="firm-name" value="AGRI CROP CARE WAREHOUSE & LOGISTICS">
                </div>
                <div class="form-group">
                    <label>GSTIN Number</label>
                    <input type="text" id="firm-gst" value="24BGNPR6060H1Z5">
                </div>
                <div class="form-group">
                    <label>License No.</label>
                    <input type="text" id="firm-license" value="GJ-20-0296072">
                </div>
                <div class="form-group">
                    <label>Work/Office Address</label>
                    <input type="text" id="firm-address" value="Vraj 3, Patidad Road, Gundala, Gondal-360311">
                </div>
            </div>

            <div class="footer-actions">
                <button class="btn btn-save" onclick="saveProfile()"><i class="fa-solid fa-cloud-arrow-up"></i> Save
                    Profile Data</button>
                <span id="success-msg" class="success-msg">Details Updated Successfully!</span>
            </div>
        </div>
    </div>

    <script>
        // Page load hone par purana data local storage se uthana
        window.onload = function () {
            const savedData = JSON.parse(localStorage.getItem('agriProfile'));
            if (savedData) {
                document.getElementById('user-name').value = savedData.name;
                document.getElementById('user-email').value = savedData.email;
                document.getElementById('user-phone').value = savedData.phone;
                document.getElementById('user-role').value = savedData.role;
                document.getElementById('firm-name').value = savedData.firm;
                document.getElementById('firm-gst').value = savedData.gst;
                document.getElementById('firm-license').value = savedData.license;
                document.getElementById('firm-address').value = savedData.address;

                // Header update
                document.getElementById('display-name').innerText = savedData.name;
                document.getElementById('display-role').innerText = savedData.role;

                if (savedData.image) {
                    document.getElementById('profile-img').src = savedData.image;
                }
            }
        };

        // Data Save Karne Ka Function
        function saveProfile() {
            const profileData = {
                name: document.getElementById('user-name').value,
                email: document.getElementById('user-email').value,
                phone: document.getElementById('user-phone').value,
                role: document.getElementById('user-role').value,
                firm: document.getElementById('firm-name').value,
                gst: document.getElementById('firm-gst').value,
                license: document.getElementById('firm-license').value,
                address: document.getElementById('firm-address').value,
                image: document.getElementById('profile-img').src
            };

            // Local Storage mein save karo
            localStorage.setItem('agriProfile', JSON.stringify(profileData));

            // Header Update
            document.getElementById('display-name').innerText = profileData.name;
            document.getElementById('display-role').innerText = profileData.role;

            // Success message dikhao
            const msg = document.getElementById('success-msg');
            msg.style.display = 'inline';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        // Image Preview Function
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function () {
                const output = document.getElementById('profile-img');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>

</html>
