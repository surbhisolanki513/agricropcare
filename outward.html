<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outward Transaction | Agri Crop Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #004d43;
            --danger: #ef4444;
            --accent: #c68a12;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #334155;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 22px;
            color: var(--primary);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border-top: 4px solid var(--danger);
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: var(--danger);
        }

        /* Balance Highlight Box */
        .balance-box {
            background: #fff1f2;
            border: 1px solid #fecaca;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-info h4 {
            margin: 0;
            font-size: 12px;
            color: #991b1b;
            text-transform: uppercase;
        }

        .balance-info p {
            margin: 5px 0 0;
            font-size: 20px;
            font-weight: 800;
            color: var(--danger);
        }

        .btn-confirm {
            background: var(--danger);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            font-size: 15px;
        }

        .btn-confirm:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Table Area */
        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f8fafc;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }

        .text-danger {
            color: var(--danger);
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        <h1>Outward Transaction</h1>
        <p style="font-size: 13px; color: #64748b;">Record stock withdrawals with automatic inventory validation.</p>
    </div>

    <!-- BALANCE SYNC STRIP -->
    <div class="balance-box">
        <div class="balance-info">
            <h4>Live Available Stock</h4>
            <p id="live-balance">0.000 MT</p>
        </div>
        <button onclick="syncBalance()"
            style="background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;">
            <i class="fa-solid fa-arrows-rotate"></i> Sync Balance
        </button>
    </div>

    <!-- WITHDRAWAL FORM -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-file-circle-minus"></i> Stock Withdrawal (Outward)</div>

        <div class="form-grid">
            <div class="form-group">
                <label>Client Name *</label>
                <select id="out-client" onchange="syncBalance()"></select>
            </div>
            <div class="form-group">
                <label>Commodity *</label>
                <select id="out-commodity" onchange="syncBalance()"></select>
            </div>
            <div class="form-group">
                <label>Warehouse *</label>
                <select id="out-warehouse" onchange="syncBalance()"></select>
            </div>
            <div class="form-group">
                <label>Withdrawal Date *</label>
                <input type="date" id="out-date">
            </div>
            <div class="form-group">
                <label>Quantity to Out (MT) *</label>
                <input type="number" id="out-qty" step="0.001" placeholder="0.000">
            </div>
            <div class="form-group">
                <label>No. of Bags</label>
                <input type="number" id="out-bags" placeholder="0">
            </div>
            <div class="form-group">
                <label>Gate Pass</label>
                <input type="text" id="out-gp" placeholder="Enter gate pass">
            </div>
            <div class="form-group">
                <label>Vehicle No.</label>
                <input type="text" id="out-vehicle" placeholder="e.g. GJ-03-XX-0000">
            </div>
        </div>

        <button class="btn-confirm" onclick="confirmWithdrawal()">
            <i class="fa-solid fa-truck-fast"></i> Confirm Withdrawal
        </button>
    </div>

    <!-- RECENT LOGS -->
    <div class="table-card">
        <div style="padding:15px; font-weight:700; color:var(--primary); background:#f8fafc;">Recent Outward Records
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Commodity</th>
                        <th>Warehouse</th>
                        <th>Out Qty (MT)</th>
                        <th>Bags</th>
                        <th>Vehicle</th>
                    </tr>
                </thead>
                <tbody id="out-table-body">
                    <!-- Data -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let clients = JSON.parse(localStorage.getItem('agriClients')) || [];
        let commodities = JSON.parse(localStorage.getItem('agriCommodities')) || [];
        let warehouses = JSON.parse(localStorage.getItem('agriWarehouses')) || [];
        let transactions = JSON.parse(localStorage.getItem('agriTransactions')) || [];

        function init() {
            // Fill Dropdowns
            document.getElementById('out-client').innerHTML = clients.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('out-commodity').innerHTML = commodities.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('out-warehouse').innerHTML = warehouses.map(w => `<option value="${w.name}">${w.name}</option>`).join('');
            document.getElementById('out-date').valueAsDate = new Date();

            syncBalance();
            renderTable();
        }

        // Calculation: Total In - Total Out
        function syncBalance() {
            const client = document.getElementById('out-client').value;
            const comm = document.getElementById('out-commodity').value;
            const wh = document.getElementById('out-warehouse').value;

            let totalIn = transactions
                .filter(t => t.cl === client && t.com === comm && t.wh === wh && t.type === 'INWARD')
                .reduce((sum, t) => sum + parseFloat(t.qty), 0);

            let totalOut = transactions
                .filter(t => t.cl === client && t.com === comm && t.wh === wh && t.type === 'OUTWARD')
                .reduce((sum, t) => sum + parseFloat(t.qty), 0);

            const balance = totalIn - totalOut;
            document.getElementById('live-balance').innerText = balance.toFixed(3) + " MT";
            return balance;
        }

        function confirmWithdrawal() {
            const qtyReq = parseFloat(document.getElementById('out-qty').value);
            const currentBal = syncBalance();
            const whName = document.getElementById('out-warehouse').value;

            if (!qtyReq || qtyReq <= 0) { alert("Please enter valid quantity!"); return; }
            if (qtyReq > currentBal) { alert("Error: Withdrawal quantity exceeds available stock!"); return; }

            const entry = {
                date: document.getElementById('out-date').value,
                cl: document.getElementById('out-client').value,
                com: document.getElementById('out-commodity').value,
                wh: whName,
                qty: qtyReq,
                bags: document.getElementById('out-bags').value || 0,
                gp: document.getElementById('out-gp').value || '-',
                vehicle: document.getElementById('out-vehicle').value || '-',
                type: 'OUTWARD'
            };

            // 1. Add to Transactions
            transactions.unshift(entry);
            localStorage.setItem('agriTransactions', JSON.stringify(transactions));

            // 2. Update Warehouse Occupancy (Subtract)
            let wh = warehouses.find(w => w.name === whName);
            if (wh) { wh.occupied = parseFloat(wh.occupied) - qtyReq; }
            localStorage.setItem('agriWarehouses', JSON.stringify(warehouses));

            alert("Withdrawal Successful!");
            document.getElementById('out-qty').value = '';
            syncBalance();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('out-table-body');
            tbody.innerHTML = transactions.filter(t => t.type === 'OUTWARD').slice(0, 10).map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td><b>${t.cl}</b></td>
                    <td>${t.com}</td>
                    <td>${t.wh}</td>
                    <td class="text-danger">-${t.qty.toFixed(3)}</td>
                    <td>${t.bags}</td>
                    <td>${t.vehicle}</td>
                </tr>
            `).join('');
        }

        window.onload = init;
    </script>
</body>

</html>
