<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Master | Agri Crop Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #004d43;
            --accent: #c68a12;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #334155;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 22px;
            color: var(--primary);
        }

        .page-header p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #64748b;
        }

        /* Form Card */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border-top: 4px solid var(--primary);
        }

        .form-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            font-weight: 600;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-register {
            background: var(--primary);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #003630;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #475569;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: none;
        }

        /* Table Section */
        .table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .table-header {
            padding: 15px 20px;
            background: #f8fafc;
            font-weight: 700;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            width: 300px;
            font-size: 12px;
            outline: none;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
        }

        th {
            text-align: left;
            padding: 15px;
            font-size: 10px;
            text-transform: uppercase;
            color: #64748b;
            background: #f8fafc;
            border-bottom: 2px solid #f1f5f9;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 12px;
            color: #1e293b;
        }

        tr:hover {
            background: #fdfdfd;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .edit-btn {
            color: #3b82f6;
            background: #eff6ff;
        }

        .del-btn {
            color: #ef4444;
            background: #fef2f2;
        }

        .edit-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .del-btn:hover {
            background: #ef4444;
            color: white;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        <h1>Client Master</h1>
        <p>Manage and search for business partners, including Farmers, FPOs, and Companies.</p>
    </div>

    <!-- Registration Form -->
    <div class="card">
        <div class="form-title" id="form-title">
            <i class="fa-solid fa-user-plus"></i> Register New Client
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Business/Owner Name *</label>
                <input type="text" id="cl-name" placeholder="e.g. Akshay Vadher">
            </div>
            <div class="form-group">
                <label>Client Type</label>
                <select id="cl-type">
                    <option value="FARMER">Farmer</option>
                    <option value="COMPANY">Company</option>
                </select>
            </div>
            <div class="form-group">
                <label>Address *</label>
                <input type="text" id="cl-address" placeholder="Location/Village/City" value="GONDAL">
            </div>
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="text" id="cl-mobile" placeholder="9876543210 or NA">
            </div>
            <div class="form-group">
                <label>PAN Card Number</label>
                <input type="text" id="cl-pan" placeholder="ABCDE1234F or NA">
            </div>
            <div class="form-group">
                <label>GSTIN</label>
                <input type="text" id="cl-gst" placeholder="24AACFP... or NA">
            </div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button id="submit-btn" class="btn-register" onclick="saveClient()">Register Client</button>
            <button id="cancel-btn" class="btn-cancel" onclick="resetForm()">Cancel Edit</button>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-card">
        <div class="table-header">
            <span>Business Partners Directory</span>
            <input type="text" class="search-box" id="search" placeholder="Search by name, mobile, GST..."
                oninput="filterTable()">
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Address</th>
                        <th>Mobile</th>
                        <th>PAN</th>
                        <th>GSTIN</th>
                        <th>WSP Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="client-table-body">
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // List jo aapne di thi
        const initialClients = [
            { name: "Agro Service Centre", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Anand Trading Co", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Ankitkumar Makadiya", type: "FARMER", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350L", gst: "07AAAAA0000A0Z1" },
            { name: "Bansi Traders", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Bhagwati Entepries", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Chapla Jayaben Ratansibhai", type: "FARMER", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Chotai Brother", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Chotai Enterprise", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Dharam Enterprise", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Dhaval Sunilchandr Sathe", type: "FARMER", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Hareshkumar Kantilal & Co", type: "FARMER", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Jain Syndicate", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Karia Rajesh Makanjibhai", type: "FARMER", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Keyur Agro", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Krupal Tradersh", type: "COMPANY", address: "JASDAN", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Kuber Trading", type: "COMPANY", address: "MORBI", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "M K Enterpries", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "M S Laxmi Enterpries", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "M/s Manshukhlal Shivlal", type: "FARMER", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Madhav Pulse Industries", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Mansi Trading", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Mavji Jina & Sons", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Nilesh Enterprise", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Radhe Trading", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Sant Enterpries", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Shankar Traders", type: "COMPANY", address: "MOTI MARAD", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Shantilal Gordhanbhai Makadiya", type: "FARMER", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" },
            { name: "Shree Padmavati Rice and Oil Mill", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Siddhi Vinayak Corporation", type: "COMPANY", address: "GONDAL", mobile: "N.A.", pan: "N.A.", gst: "N.A." },
            { name: "Sureshwar Corporation", type: "COMPANY", address: "GONDAL", mobile: "9082994158", pan: "BAJPC4350M", gst: "07AAAAA0000A0Z1" }
        ];

        let clients = JSON.parse(localStorage.getItem('agriClients')) || initialClients;
        let editIndex = -1;

        function renderTable(data = clients) {
            const tbody = document.getElementById('client-table-body');
            const profile = JSON.parse(localStorage.getItem('agriProfile')) || { firm: 'Agri Crop Care' };

            tbody.innerHTML = data.map((c, i) => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.type}</td>
                    <td>${c.address}</td>
                    <td>${c.mobile}</td>
                    <td>${c.pan}</td>
                    <td>${c.gst}</td>
                    <td>${profile.firm}</td>
                    <td>
                        <div class="actions">
                            <button class="action-btn edit-btn" onclick="editClient(${i})"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="action-btn del-btn" onclick="deleteClient(${i})"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            localStorage.setItem('agriClients', JSON.stringify(clients));
        }

        function saveClient() {
            const name = document.getElementById('cl-name').value;
            const type = document.getElementById('cl-type').value;
            const addr = document.getElementById('cl-address').value;
            const mob = document.getElementById('cl-mobile').value;
            const pan = document.getElementById('cl-pan').value || 'NA';
            const gst = document.getElementById('cl-gst').value || 'NA';

            if (!name || !mob) { alert("Please fill Name and Mobile!"); return; }

            const clientObj = { name, type, address: addr, mobile: mob, pan, gst };

            if (editIndex > -1) {
                clients[editIndex] = clientObj;
                editIndex = -1;
            } else {
                clients.unshift(clientObj);
            }

            resetForm();
            renderTable();
        }

        function editClient(index) {
            editIndex = index;
            const c = clients[index];
            document.getElementById('cl-name').value = c.name;
            document.getElementById('cl-type').value = c.type;
            document.getElementById('cl-address').value = c.address;
            document.getElementById('cl-mobile').value = c.mobile;
            document.getElementById('cl-pan').value = c.pan;
            document.getElementById('cl-gst').value = c.gst;

            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Edit Client Details';
            document.getElementById('submit-btn').innerText = 'Update Client';
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function deleteClient(index) {
            if (confirm("Are you sure you want to delete this client?")) {
                clients.splice(index, 1);
                renderTable();
            }
        }

        function resetForm() {
            editIndex = -1;
            document.getElementById('cl-name').value = '';
            document.getElementById('cl-mobile').value = '';
            document.getElementById('cl-pan').value = '';
            document.getElementById('cl-gst').value = '';
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-user-plus"></i> Register New Client';
            document.getElementById('submit-btn').innerText = 'Register Client';
            document.getElementById('cancel-btn').style.display = 'none';
        }

        function filterTable() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = clients.filter(c =>
                c.name.toLowerCase().includes(term) ||
                c.mobile.toLowerCase().includes(term) ||
                c.gst.toLowerCase().includes(term)
            );
            renderTable(filtered);
        }

        window.onload = renderTable;
    </script>
</body>

</html>
