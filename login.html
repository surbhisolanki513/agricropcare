<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Crop Care - Access</title>
    <style>
        /* CSS Settings */
        :root {
            --agri-green: #2d6a4f;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 6px solid var(--agri-green);
        }

        .logo {
            width: 90px;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--agri-green);
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--agri-green);
            outline: none;
            box-shadow: 0 0 5px rgba(45, 106, 79, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--agri-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1b4332;
        }

        .btn-orange {
            background: #e67e22;
        }

        /* Forgot password button color */
        .btn-orange:hover {
            background: #d35400;
        }

        .links-container {
            margin-top: 20px;
            font-size: 14px;
        }

        .links-container a {
            color: var(--agri-green);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* Chhupane ke liye */

        /* Media Query for Mobile */
        @media (max-width: 400px) {
            .auth-card {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2910/2910756.png" class="logo">
        <h2>Agri Crop Care</h2>

        <!-- 1. LOGIN FORM -->
        <div id="login-section">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="email" placeholder="agricropwl@outlook.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="123456" required>
                </div>
                <button type="submit" class="btn">SIGN IN</button>
            </form>
            <div class="links-container">
                <a onclick="showSection('forgot-section')">Forgot Password?</a>
            </div>
        </div>

        <!-- 2. FORGOT / CHANGE PASSWORD FORM -->
        <div id="forgot-section" class="hidden">
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Apna email aur naya password bhariye</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label>Registered Email</label>
                    <input type="email" id="reset-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required>
                </div>
                <button type="submit" class="btn btn-orange">UPDATE PASSWORD</button>
            </form>
            <div class="links-container">
                <a onclick="showSection('login-section')">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // 1. Dono forms ke beech switch karne ka logic
        function showSection(sectionId) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('forgot-section').classList.add('hidden');

            document.getElementById(sectionId).classList.remove('hidden');
        }

        // 2. Login Logic
        document.getElementById('loginForm').onsubmit = function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (email === "agricropwl@outlook.com" && pass === "123456") {
                alert("Login Successful!");
                window.location.href = "index.html"; // Aapka Dashboard
            } else {
                alert("Galat Email ya Password!");
            }
        };

        // 3. Forgot Password Logic
        document.getElementById('forgotForm').onsubmit = function (e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            alert("Password reset request sent for: " + email + "\nAb naye password se login karein.");
            showSection('login-section');
        };
    </script>

</body>

</html>
